<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <title>Weather Palette</title>
  <link rel="stylesheet" href="src/style.css"/>
</head>
<body>

  <div class="app">
    <h1>🌤️ Weather Palette</h1>

    <div class="search">
      <input id="cityInput" type="text" placeholder="Enter a city" />
      <input id="cityInput" autocomplete="off"/>
      <input id="cityInput" autocomplete="off" autocapitalize="off"/>
      <button id="searchBtn">Search</button>
      <button id="voiceBtn">🎤 Speak</button>
    </div>

    <p id="status"></p>

    <div id="weatherContainer" class="hidden">
      <div class="card current">
        <h2 id="cityName"></h2>
        <p id="currentTemp"></p>
      </div>
    <div class="weather-section">

        <div id="forecast" class="forecast"></div>
        <div id="map" class="hidden"></div>
      </div>

    <canvas id="hourlyChart" class="hidden"></canvas>
    </div>

    <footer>
        Built by Karen Berglund 💙 |
        <a href="https://github.com/Primabratinella/PythonBasicsFinalProject---Week6" target="_blank" rel="noopener noreferrer">
          Open Source Code
        </a>
      </footer>
  </div>

  <script src="src/index.js" ></script>
</body>
</html>
