<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <title>Weather Palette</title>
  <link rel="stylesheet" href="src/style.css"/>
</head>
<body>

  <div class="app">
    <h1>🌤️ Weather Palette</h1>

    <div class="search">
      <input id="cityInput" type="text" placeholder="Enter a city..." />
      <button id="searchBtn">Search</button>
    </div>

    <p id="status"></p>

    <div id="weatherContainer" class="hidden">
      <div class="card current">
        <h2 id="cityName"></h2>
        <p id="currentTemp"></p>
      </div>

      <div id="forecast" class="forecast"></div>
    </div>

    <!-- 🌡️ Hourly Chart -->
    <canvas id="hourlyChart" class="hidden"></canvas>

    <!-- 🗺️ Map -->
    <div id="map" class="hidden"></div>

    <footer>Built by Karen Berglund 💙</footer>
  </div>

  <!-- IMPORTANT: correct path -->
  <script src="src/index.js"></script>
</body>
</html>
